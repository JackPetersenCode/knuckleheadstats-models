server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Live data (picks/record) + the page shell must never be cached, so a new
    # board shows immediately after each publish instead of a stale copy.
    location ~* \.(json|csv)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Proxy API calls (e.g. the waitlist form) to the backend
    location /api/ {
        proxy_pass https://thehoopscoop-api.fly.dev;
        proxy_ssl_server_name on;
        proxy_set_header Host thehoopscoop-api.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
